name: RVForge RISC-V Cross-Compilation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      enable_rvv:
        description: 'Enable RVV stretch target'
        required: false
        default: 'false'

env:
  RISCV_TRIPLE: riscv64-linux-gnu
  MARCH: rv64gc
  MABI: lp64d
  BUILD_DIR: build_ci
  INSTALL_DIR: install_ci

jobs:
  toolchain-probe:
    name: Toolchain Verification
    runs-on: ubuntu-22.04
    outputs:
      gcc_version: ${{ steps.probe.outputs.gcc_version }}
      qemu_version: ${{ steps.probe.outputs.qemu_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu \
            qemu-user-static \
            binfmt-support \
            cmake ninja-build \
            autoconf automake libtool texinfo \
            wget xz-utils gawk libgmp-dev

      - name: Probe toolchain
        id: probe
        run: |
          GCC_VER=$(riscv64-linux-gnu-gcc --version | head -1)
          QEMU_VER=$(qemu-riscv64-static --version | head -1)
          echo "gcc_version=${GCC_VER}" >> "$GITHUB_OUTPUT"
          echo "qemu_version=${QEMU_VER}" >> "$GITHUB_OUTPUT"
          echo "GCC:  ${GCC_VER}"
          echo "QEMU: ${QEMU_VER}"

      - name: Compile and run hello-riscv
        run: |
          cat > /tmp/hello.c <<'EOF'
          #include <stdio.h>
          int main(void) {
              printf("Hello from RISC-V (arch=%s)\n",
          #if defined(__riscv)
                  "riscv64"
          #else
                  "unknown"
          #endif
              );
              return 0;
          }
          EOF
          riscv64-linux-gnu-gcc -march=rv64gc -mabi=lp64d -static \
              -o /tmp/hello /tmp/hello.c
          file /tmp/hello
          qemu-riscv64-static /tmp/hello

  cross-build-mpfr:
    name: Cross-Build MPFR
    runs-on: ubuntu-22.04
    needs: toolchain-probe
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu qemu-user-static \
            cmake ninja-build autoconf automake libtool texinfo \
            wget xz-utils gawk libgmp-dev

      - name: Cache MPFR build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/gmp-build
            ${{ env.BUILD_DIR }}/mpfr-build
            ${{ env.INSTALL_DIR }}
          key: mpfr-riscv64-${{ hashFiles('ports/mpfr/CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=toolchain/riscv64-linux-gnu.cmake \
            -DRVFORGE_BUILD_MPFR=ON \
            -DRVFORGE_BUILD_OPENBLAS=OFF \
            -G Ninja \
            2>&1 | tee docs/errors/ci_configure.log

      - name: Build GMP + MPFR
        run: |
          cmake --build ${{ env.BUILD_DIR }} --target gmp_riscv  -- -j4 \
            2>&1 | tee docs/errors/ci_gmp_build.log
          cmake --build ${{ env.BUILD_DIR }} --target mpfr_riscv -- -j4 \
            2>&1 | tee docs/errors/ci_mpfr_build.log

      - name: Build smoke test binary
        run: |
          cmake --build ${{ env.BUILD_DIR }} --target mpfr_smoke -- -j4

      - name: Run smoke test under QEMU
        run: |
          qemu-riscv64-static \
            -L /usr/riscv64-linux-gnu \
            ${{ env.BUILD_DIR }}/bin/mpfr_smoke

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mpfr-logs
          path: docs/errors/

  cross-build-openblas:
    name: Cross-Build OpenBLAS
    runs-on: ubuntu-22.04
    needs: toolchain-probe
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu qemu-user-static \
            cmake ninja-build

      - name: Cache OpenBLAS build
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/openblas-build
            ${{ env.INSTALL_DIR }}/openblas
          key: openblas-riscv64-${{ hashFiles('ports/openblas/CMakeLists.txt', 'patches/0002-*.patch') }}

      - name: Configure
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} \
            -DCMAKE_TOOLCHAIN_FILE=toolchain/riscv64-linux-gnu.cmake \
            -DRVFORGE_BUILD_MPFR=OFF \
            -DRVFORGE_BUILD_OPENBLAS=ON \
            -G Ninja \
            2>&1 | tee docs/errors/ci_openblas_configure.log

      - name: Build OpenBLAS
        run: |
          cmake --build ${{ env.BUILD_DIR }} --target openblas_riscv -- -j4 \
            2>&1 | tee docs/errors/ci_openblas_build.log

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openblas-logs
          path: docs/errors/

  apply-patches:
    name: Apply Patches
    runs-on: ubuntu-22.04
    needs: [cross-build-mpfr, cross-build-openblas]
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y patch wget xz-utils

      - name: Restore OpenBLAS source
        uses: actions/download-artifact@v4
        with:
          name: openblas-artifacts
          path: extern/

      - name: Apply all patches
        run: |
          chmod +x scripts/apply_patches.sh
          ./scripts/apply_patches.sh

      - name: Upload patched sources
        uses: actions/upload-artifact@v4
        with:
          name: patched-sources
          path: extern/

  simd-audit:
    name: SIMD Intrinsic Audit
    runs-on: ubuntu-22.04
    needs: apply-patches
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu \
            qemu-user-static cmake ninja-build wget xz-utils

      - name: Restore patched sources
        uses: actions/download-artifact@v4
        with:
          name: patched-sources
          path: extern/

      - name: Run SIMD audit
        run: |
          chmod +x scripts/simd_audit.sh
          ./scripts/simd_audit.sh

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: simd-audit-report
          path: |
            audit/x86_intrinsics_found.txt
            audit/simd_audit_report.md

  numerical-suite:
    name: Numerical Correctness Suite
    runs-on: ubuntu-22.04
    needs: [cross-build-openblas, cross-build-mpfr]
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu qemu-user-static \
            cmake ninja-build

      - name: Restore artifacts
        uses: actions/download-artifact@v4
        with:
          name: openblas-artifacts
          path: build_ci/install/openblas

      - name: Build numerical_suite
        run: |
          cmake -S . -B build_ci \
            -DCMAKE_TOOLCHAIN_FILE=toolchain/riscv64-linux-gnu.cmake \
            -DRVFORGE_BUILD_MPFR=OFF \
            -DRVFORGE_BUILD_OPENBLAS=OFF \
            -G Ninja
          cmake --build build_ci --target numerical_suite -- -j4

      - name: Run numerical_suite under QEMU
        run: |
          qemu-riscv64-static -L /usr/riscv64-linux-gnu \
            build_ci/bin/numerical_suite 2>&1 | tee audit/results/numerical_suite_ci.log
          grep "STATUS: PASS" audit/results/numerical_suite_ci.log

      - name: Run simd_audit_report under QEMU
        run: |
          cmake --build build_ci --target simd_audit_report -- -j4
          qemu-riscv64-static -L /usr/riscv64-linux-gnu \
            build_ci/bin/simd_audit_report 2>&1 | tee audit/results/simd_audit_ci.log
          grep "STATUS: PASS" audit/results/simd_audit_ci.log

      - name: Run diff_results
        run: |
          chmod +x scripts/diff_results.sh
          ./scripts/diff_results.sh 1e-10

      - name: Upload numerical results
        uses: actions/upload-artifact@v4
        with:
          name: numerical-results
          path: |
            audit/results/
            audit/simd_audit_report.md

  summarize:
    name: Summary
    runs-on: ubuntu-22.04
    needs: [toolchain-probe, cross-build-mpfr, cross-build-openblas, apply-patches, simd-audit, numerical-suite]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## RVForge Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain Probe | ${{ needs.toolchain-probe.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MPFR Cross-Build | ${{ needs.cross-build-mpfr.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenBLAS Cross-Build | ${{ needs.cross-build-openblas.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Apply Patches | ${{ needs.apply-patches.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SIMD Audit | ${{ needs.simd-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Numerical Suite | ${{ needs.numerical-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GCC: ${{ needs.toolchain-probe.outputs.gcc_version }}" >> $GITHUB_STEP_SUMMARY
          echo "QEMU: ${{ needs.toolchain-probe.outputs.qemu_version }}" >> $GITHUB_STEP_SUMMARY
